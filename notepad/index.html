<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Notepad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            margin: 0;
            padding: 10px;
            text-align: center;
            background-color: #f0f0f0;
        }
        textarea {
            flex: 1;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            resize: none; /* Optional: Prevents resizing of the textarea */
            overflow-y: auto; /* Ensures smooth scrolling */
        }
    </style>
</head>
<body>
    <h1>Online Notepad</h1>
    <textarea id="notepad"></textarea>
    <script>
        // Load saved note from local storage
        document.addEventListener('DOMContentLoaded', function() {
            const savedNote = localStorage.getItem('note');
            if (savedNote) {
                document.getElementById('notepad').value = savedNote;
            }
        });

        // Save note to local storage on input
        document.getElementById('notepad').addEventListener('input', function() {
            const noteContent = document.getElementById('notepad').value;
            localStorage.setItem('note', noteContent);
        });
    </script>
</body>
</html>
